<!doctype html>
<html lang="en"><head>
<meta charset="utf-8"/><meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>Clip Factory Studio</title>
<style>
  :root{--bg:#0c0a14;--card:#15121f;--line:#241d33;--ink:#f1ecff;--mut:#a99fc6;--acc:#a855f7;--acc2:#ec4899;--good:#22c55e}
  *{box-sizing:border-box;margin:0;padding:0}
  body{font:15px/1.55 system-ui,Segoe UI,Roboto,sans-serif;background:radial-gradient(1100px 500px at 70% -10%,#1c1430,#0c0a14);color:var(--ink);min-height:100vh}
  .wrap{max-width:1000px;margin:0 auto;padding:22px}
  h1{font-size:26px;font-weight:900}h1 span{background:linear-gradient(90deg,var(--acc),var(--acc2));-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent}
  .sub{color:var(--mut);margin:2px 0 18px;font-size:14px}
  .tabs{display:flex;gap:8px;margin-bottom:16px}
  .tab{padding:10px 20px;border-radius:12px;background:var(--card);border:1px solid var(--line);cursor:pointer;font-weight:700}
  .tab.on{background:linear-gradient(135deg,var(--acc),var(--acc2));border:0;color:#fff}
  .panel{background:var(--card);border:1px solid var(--line);border-radius:16px;padding:20px;display:none}
  .panel.on{display:block}
  label{display:block;font-size:13px;color:var(--mut);margin:12px 0 5px;font-weight:600}
  input,select,textarea{width:100%;font:inherit;background:#0e0b1a;border:1px solid var(--line);color:var(--ink);border-radius:10px;padding:11px 13px}
  textarea{min-height:64px;resize:vertical}
  .row{display:flex;gap:12px;flex-wrap:wrap}.row>div{flex:1;min-width:130px}
  .btn{margin-top:16px;background:linear-gradient(135deg,var(--acc),var(--acc2));color:#fff;border:0;border-radius:12px;padding:13px 26px;font-weight:800;cursor:pointer;font-size:15px}
  .btn:disabled{opacity:.5;cursor:default}
  .btn.ghost{background:transparent;border:1px solid var(--line);color:var(--ink)}
  .list{margin-top:10px;max-height:230px;overflow:auto;border:1px solid var(--line);border-radius:10px}
  .li{padding:9px 12px;border-bottom:1px solid var(--line);cursor:pointer;font-size:13px}.li:hover{background:#1b1630}
  .li b{color:var(--acc2)}
  .log{margin-top:16px;background:#08060f;border:1px solid var(--line);border-radius:10px;padding:12px;font:12px/1.5 ui-monospace,monospace;color:#b9aee0;max-height:200px;overflow:auto;white-space:pre-wrap;display:none}
  .results{margin-top:18px;display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:16px}
  .clip{background:#0e0b1a;border:1px solid var(--line);border-radius:14px;overflow:hidden}
  .clip video{width:100%;display:block;background:#000;aspect-ratio:9/16;object-fit:cover}
  .clip .meta{padding:10px 12px}.clip .hook{font-weight:700;font-size:14px}.clip .vir{color:var(--acc2);font-size:12px;font-weight:700}
  .clip a{display:inline-block;margin-top:6px;color:var(--acc);font-size:13px}
  .hint{color:var(--mut);font-size:12px;margin-top:4px}
  .spin{display:inline-block;width:13px;height:13px;border:2px solid #ffffff44;border-top-color:#fff;border-radius:50%;animation:s 1s linear infinite;vertical-align:-2px;margin-right:7px}
  @keyframes s{to{transform:rotate(360deg)}}
</style></head>
<body><div class="wrap">
  <h1>Clip<span>Factory</span> Studio</h1>
  <p class="sub">Two ways to make a vertical short — clip a real video, or generate one from scratch. You pick the source and the edit.</p>

  <div class="tabs">
    <div class="tab on" data-m="clip">✂️ Clip a video</div>
    <div class="tab" data-m="gen">✨ Generate from scratch</div>
  </div>

  <!-- CLIP -->
  <div class="panel on" id="p-clip">
    <label>YouTube URL</label>
    <input id="c-url" placeholder="https://www.youtube.com/watch?v=…"/>
    <button class="btn ghost" id="c-disc" style="margin-top:10px;padding:9px 16px;font-size:13px">🔥 Discover hot videos</button>
    <div class="list" id="c-list" style="display:none"></div>
    <div class="row">
      <div><label>Clips</label><input id="c-n" type="number" value="3" min="1" max="8"/></div>
      <div><label>Framing</label><select id="c-frame"><option value="smart">Smart (auto)</option><option value="fill">Fill (centre zoom)</option><option value="blur">Blur background</option></select></div>
      <div><label>Use first … min</label><input id="c-head" type="number" value="10" min="2" max="40"/></div>
    </div>
    <button class="btn" id="c-go">Make clips →</button>
  </div>

  <!-- GENERATE -->
  <div class="panel" id="p-gen">
    <label>Topic <span class="hint">— leave blank to auto-pick a live trending topic</span></label>
    <input id="g-topic" placeholder="e.g. the science of why we dream (or blank for trending)"/>
    <button class="btn ghost" id="g-trends" style="margin-top:10px;padding:9px 16px;font-size:13px">🔥 Hot topics</button>
    <div class="list" id="g-list" style="display:none"></div>
    <div class="row">
      <div><label>Voice</label><select id="g-voice"><option>Charon</option><option>Puck</option><option>Kore</option><option>Aoede</option><option>Fenrir</option></select></div>
    </div>
    <button class="btn" id="g-go">Generate video →</button>
    <p class="hint">Generates AI voice + AI visuals (~3-4 min).</p>
  </div>

  <div class="log" id="log"></div>
  <div class="results" id="results"></div>
</div>
<script>
const $=s=>document.querySelector(s), log=$('#log'), results=$('#results');
document.querySelectorAll('.tab').forEach(t=>t.onclick=()=>{
  document.querySelectorAll('.tab').forEach(x=>x.classList.toggle('on',x===t));
  $('#p-clip').classList.toggle('on',t.dataset.m==='clip'); $('#p-gen').classList.toggle('on',t.dataset.m==='gen');
});
function setLog(lines){ log.style.display='block'; log.textContent=lines.join('\n'); log.scrollTop=log.scrollHeight; }
async function poll(id, btn){
  while(true){
    await new Promise(r=>setTimeout(r,2500));
    const j=await (await fetch('/api/job?id='+id)).json();
    setLog(j.log||[]);
    if(j.status==='done'){ render(j.result); btn.disabled=false; btn.innerHTML=btn.dataset.t; return; }
    if(j.status==='error'){ setLog([...(j.log||[]),'❌ failed']); btn.disabled=false; btn.innerHTML=btn.dataset.t; return; }
  }
}
function render(r){
  results.innerHTML='';
  (r?.clips||[]).forEach(c=>{
    const src='/file?p='+encodeURIComponent(c.file);
    const el=document.createElement('div'); el.className='clip';
    el.innerHTML=`<video src="${src}" controls preload="metadata"></video><div class="meta">`+
      (c.viral!=null?`<div class="vir">🔥 viral ${c.viral}</div>`:'')+
      `<div class="hook">${c.hook||''}</div><div class="hint">${c.dur||''}s</div><a href="${src}" download>⬇ download</a></div>`;
    results.appendChild(el);
  });
  if(!(r?.clips||[]).length) setLog([...(log.textContent?[log.textContent]:[]),'(no output)']);
}
async function start(btn, url, body){
  btn.disabled=true; btn.dataset.t=btn.innerHTML; btn.innerHTML='<span class="spin"></span>working…';
  results.innerHTML=''; setLog(['starting…']);
  const j=await (await fetch(url,{method:'POST',headers:{'content-type':'application/json'},body:JSON.stringify(body)})).json();
  if(j.error){ setLog(['error: '+j.error]); btn.disabled=false; btn.innerHTML=btn.dataset.t; return; }
  poll(j.id, btn);
}
$('#c-go').onclick=()=>{ const url=$('#c-url').value.trim(); if(!url)return alert('paste a YouTube URL'); start($('#c-go'),'/api/clip',{url,n:+$('#c-n').value,frame:$('#c-frame').value,head:+$('#c-head').value}); };
$('#g-go').onclick=()=>start($('#g-go'),'/api/generate',{topic:$('#g-topic').value.trim(),voice:$('#g-voice').value});
$('#c-disc').onclick=async e=>{ e.target.textContent='loading…'; const {vids}=await (await fetch('/api/discover')).json(); const L=$('#c-list'); L.style.display='block';
  L.innerHTML=vids.map(v=>`<div class="li" data-u="${v.url}"><b>[${v.score}]</b> ${v.title} — ${v.channel}</div>`).join(''); e.target.textContent='🔥 Discover hot videos';
  L.querySelectorAll('.li').forEach(li=>li.onclick=()=>{$('#c-url').value=li.dataset.u; L.style.display='none';}); };
$('#g-trends').onclick=async e=>{ e.target.textContent='loading…'; const {topics}=await (await fetch('/api/trends')).json(); const L=$('#g-list'); L.style.display='block';
  L.innerHTML=topics.map(t=>`<div class="li">${t}</div>`).join(''); e.target.textContent='🔥 Hot topics';
  L.querySelectorAll('.li').forEach(li=>li.onclick=()=>{$('#g-topic').value=li.textContent; L.style.display='none';}); };
</script>
</body></html>
